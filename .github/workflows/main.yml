    name: Download and Commit EXE (Force Node 24)
    on:
      workflow_dispatch:
    jobs:
      download-and-commit:
        runs-on: ubuntu-latest
        env: # اضافه کردن متغیر محیطی برای اجبار به Node.js 24
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        steps:
          - name: Checkout repository
            uses: actions/checkout@v4 # این نسخه رو نگه می‌داریم چون قراره FORCE کنیم Node 24 رو

          - name: Download Lunacy EXE from URL
            run: curl -L "https://lcdn.icons8.com/setup/beta/LunacySetup.exe" -o LunacySetup.exe

          - name: Set up Git configuration
            run: |
              git config --local user.email "github-actions[bot]@users.noreply.github.com"
              git config --local user.name "github-actions[bot]"

          - name: Commit and push the file
            env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            run: |
              git add LunacySetup.exe
              git commit -m "Add LunacySetup.exe from URL"
              git push origin HEAD:${{ github.ref }}
